---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-admin-binding
roleRef:
  kind: ClusterRole
  name: cluster-admin # K8's ships with a default cluster admin role and group. However EKS API will not allow to use default group
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: Group 
    name: my-admin # We need to create our own admin group in K8's
    apiGroup: rbac.authorization.k8s.io
